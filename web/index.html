<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-car-front"></i>
                <span>Vehicle Rental System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/data">Data</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/statistics">Statistics</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-4">
        <div id="content">Loading...</div>
    </main>

    <!-- Footer -->
    <footer class="text-light py-3 mt-5">
        <div class="container-fluid text-center">
            <p class="mb-0">&copy; 2026 Vehicle Rental System | C++ Backend + Node.js Dashboard</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get current page and load appropriate content
        const currentPath = window.location.pathname;
        
        async function loadContent() {
            let content = '';
            
            try {
                if (currentPath === '/' || currentPath === '/home') {
                    content = await loadHome();
                } else if (currentPath === '/data') {
                    content = await loadData();
                } else if (currentPath === '/statistics') {
                    content = await loadStatistics();
                } else {
                    content = '<div class="alert alert-danger">Page not found</div>';
                }
            } catch (err) {
                content = `<div class="alert alert-danger">Error loading content: ${err.message}</div>`;
            }
            
            document.getElementById('content').innerHTML = content;
        }

        async function loadHome() {
            const stats = await fetch('/api/stats').then(r => r.json());
            
            return `
                <div class="row mb-4">
                    <div class="col-12">
                        <h1 class="display-4">Dashboard</h1>
                        <p class="lead text-muted">Welcome to the Vehicle Rental System</p>
                    </div>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <small class="text-muted">Total Vehicles</small>
                                        <h3 class="mb-0">${stats.totalVehicles}</h3>
                                    </div>
                                    <i class="bi bi-car-front fs-1 text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <small class="text-muted">Available</small>
                                        <h3 class="mb-0 text-success">${stats.availableVehicles}</h3>
                                    </div>
                                    <i class="bi bi-check-circle fs-1 text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <small class="text-muted">Rented</small>
                                        <h3 class="mb-0 text-danger">${stats.rentedVehicles}</h3>
                                    </div>
                                    <i class="bi bi-exclamation-circle fs-1 text-danger"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <small class="text-muted">Total Customers</small>
                                        <h3 class="mb-0">${stats.totalCustomers}</h3>
                                    </div>
                                    <i class="bi bi-people fs-1 text-info"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Vehicle Status</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="statusChart"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Vehicle Types</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="typeChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Revenue</h5>
                            </div>
                            <div class="card-body">
                                <h2 class="text-success">$${stats.totalRevenue}</h2>
                                <small class="text-muted">Total revenue from all rentals</small>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const vehicles = await fetch('/api/vehicles').then(r => r.json());
            const customers = await fetch('/api/customers').then(r => r.json());
            const rentals = await fetch('/api/rentals').then(r => r.json());

            const vehiclesTable = vehicles.map(v => `
                <tr>
                    <td>${v.id}</td>
                    <td>${v.type}</td>
                    <td>${v.brand}</td>
                    <td>${v.model}</td>
                    <td>$${v.rentPerDay}</td>
                    <td><span class="badge ${v.status === 'Available' ? 'bg-success' : 'bg-danger'}">${v.status}</span></td>
                </tr>
            `).join('');

            const customersTable = customers.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.phone}</td>
                    <td>${c.email}</td>
                </tr>
            `).join('');

            const rentalsTable = rentals.map(r => `
                <tr>
                    <td>${r.rentalId}</td>
                    <td>${r.customerId}</td>
                    <td>${r.vehicleId}</td>
                    <td>${r.startDate}</td>
                    <td>${r.endDate}</td>
                    <td>$${r.totalCost}</td>
                </tr>
            `).join('');

            return `
                <div class="row mb-4">
                    <div class="col-12">
                        <h1 class="display-4">Data View</h1>
                        <p class="lead text-muted">Browse all vehicles, customers, and rentals</p>
                    </div>
                </div>

                <ul class="nav nav-tabs mb-4" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="vehicles-tab" data-bs-toggle="tab" data-bs-target="#vehicles">Vehicles</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="customers-tab" data-bs-toggle="tab" data-bs-target="#customers">Customers</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="rentals-tab" data-bs-toggle="tab" data-bs-target="#rentals">Rentals</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="vehicles">
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Type</th>
                                            <th>Brand</th>
                                            <th>Model</th>
                                            <th>Daily Rate</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${vehiclesTable}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="customers">
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Phone</th>
                                            <th>Email</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${customersTable}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="rentals">
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Rental ID</th>
                                            <th>Customer</th>
                                            <th>Vehicle</th>
                                            <th>Start Date</th>
                                            <th>End Date</th>
                                            <th>Cost</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${rentalsTable}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadStatistics() {
            const stats = await fetch('/api/stats').then(r => r.json());
            
            return `
                <div class="row mb-4">
                    <div class="col-12">
                        <h1 class="display-4">Statistics</h1>
                        <p class="lead text-muted">Analytics and insights</p>
                    </div>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <h6 class="text-muted">Total Revenue</h6>
                                <h2 class="text-success">$${stats.totalRevenue}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <h6 class="text-muted">Total Rentals</h6>
                                <h2 class="text-info">${stats.totalRentals}</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <h6 class="text-muted">Utilization Rate</h6>
                                <h2 class="text-warning">${stats.totalVehicles > 0 ? Math.round((stats.rentedVehicles / stats.totalVehicles) * 100) : 0}%</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Vehicle Availability</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="statusChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Fleet Composition</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="typeChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Load page on startup and initialize charts
        document.addEventListener('DOMContentLoaded', () => {
            loadContent();
            updateActiveNav();
            
            // Initialize charts after content loads
            setTimeout(() => {
                initCharts();
            }, 300);

            // Handle navigation links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if (href && href.startsWith('/')) {
                        e.preventDefault();
                        window.history.pushState(null, '', href);
                        loadContent();
                        updateActiveNav();
                        setTimeout(() => {
                            initCharts();
                        }, 300);
                    }
                });
            });
        });

        function updateActiveNav() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === window.location.pathname) {
                    link.classList.add('active');
                }
            });
        }

        async function initCharts() {
            // Destroy old charts
            const statusCtx = document.getElementById('statusChart');
            const typeCtx = document.getElementById('typeChart');
            
            if (statusCtx && statusCtx.chart) {
                statusCtx.chart.destroy();
            }
            if (typeCtx && typeCtx.chart) {
                typeCtx.chart.destroy();
            }

            // Status chart
            if (statusCtx) {
                try {
                    const chartData = await fetch('/api/vehicle-status-chart').then(r => r.json());
                    statusCtx.chart = new Chart(statusCtx, {
                        type: 'doughnut',
                        data: {
                            labels: chartData.labels,
                            datasets: [{
                                data: chartData.datasets[0].data,
                                backgroundColor: ['#28a745', '#dc3545'],
                                borderColor: '#fff',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { legend: { position: 'bottom' } }
                        }
                    });
                } catch (err) {
                    console.error('Error initializing status chart:', err);
                }
            }

            // Type chart
            if (typeCtx) {
                try {
                    const chartData = await fetch('/api/vehicle-type-chart').then(r => r.json());
                    typeCtx.chart = new Chart(typeCtx, {
                        type: 'bar',
                        data: {
                            labels: chartData.labels,
                            datasets: [{
                                label: 'Count',
                                data: chartData.datasets[0].data,
                                backgroundColor: ['#007bff', '#ffc107', '#17a2b8'],
                                borderRadius: 5,
                                borderSkipped: false
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            indexAxis: 'y',
                            plugins: { legend: { display: true } }
                        }
                    });
                } catch (err) {
                    console.error('Error initializing type chart:', err);
                }
            }
        }
    </script>
</body>
</html>
